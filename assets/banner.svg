<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320">
<stop offset="0%" stop-color="#020617"/>
<stop offset="50%" stop-color="#071428"/>
<stop offset="100%" stop-color="#0B1120"/>
</linearGradient>

<linearGradient id="title" x1="0" y1="0" x2="800" y2="0">
<stop offset="0%" stop-color="#3B82F6"/>
<stop offset="50%" stop-color="#ffffff"/>
<stop offset="100%" stop-color="#22C55E"/>

<animate attributeName="x1" values="-500;1200;-500" dur="12s" repeatCount="indefinite"/>
</linearGradient>

<filter id="glow">
<feGaussianBlur stdDeviation="3" result="blur"/>
<feMerge>
<feMergeNode in="blur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>

</defs>

<rect width="1200" height="320" fill="url(#bg)"/>

<!-- Grid -->

<g opacity="0.08">

<path d="M0 40 H1200"/>
<path d="M0 80 H1200"/>
<path d="M0 120 H1200"/>
<path d="M0 160 H1200"/>
<path d="M0 200 H1200"/>
<path d="M0 240 H1200"/>
<path d="M0 280 H1200"/>

<path d="M80 0 V320"/>
<path d="M160 0 V320"/>
<path d="M240 0 V320"/>
<path d="M320 0 V320"/>
<path d="M400 0 V320"/>
<path d="M480 0 V320"/>
<path d="M560 0 V320"/>
<path d="M640 0 V320"/>
<path d="M720 0 V320"/>
<path d="M800 0 V320"/>
<path d="M880 0 V320"/>
<path d="M960 0 V320"/>
<path d="M1040 0 V320"/>
<path d="M1120 0 V320"/>

</g>

<!-- Circuit Lines -->

<g stroke="#22C55E" stroke-width="2" opacity="0.45">

<path d="M120 70 H260 V110 H430"/>

<path d="M1000 70 H900 V120 H760"/>

<path d="M200 260 H340 V220 H540"/>

<path d="M1040 250 H930 V210 H720"/>

</g>

<!-- Pulses -->

<circle r="4" fill="#22C55E">

<animateMotion dur="6s" repeatCount="indefinite">

<mpath href="#pulse1"/>

</animateMotion>

</circle>

<path id="pulse1" d="M120 70 H260 V110 H430" opacity="0"/>

<circle r="4" fill="#3B82F6">

<animateMotion dur="8s" repeatCount="indefinite">

<mpath href="#pulse2"/>

</animateMotion>

</circle>

<path id="pulse2" d="M1040 250 H930 V210 H720" opacity="0"/>

<!-- Name -->

<text

x="600"

y="145"

text-anchor="middle"

font-size="44"

font-family="Segoe UI, Arial"

font-weight="700"

fill="url(#title)"

filter="url(#glow)">

MUHAMMAD SAIM IFTIKHAR

</text>

<!-- Subtitle -->

<text

x="600"

y="190"

text-anchor="middle"

font-size="20"

font-family="Segoe UI"

fill="#D4D4D8">

Cyber Security • AI Automation • Full-Stack Engineering

</text>

<!-- Decorative Dots -->

<circle cx="180" cy="60" r="3" fill="#22C55E">
<animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/>
</circle>

<circle cx="1030" cy="250" r="3" fill="#3B82F6">
<animate attributeName="opacity" values="1;0.2;1" dur="4s" repeatCount="indefinite"/>
</circle>

</svg>
