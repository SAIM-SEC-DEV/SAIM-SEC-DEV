<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="100%" height="340">
  <defs>
    <!-- Dark Blue/Slate Palette Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#071428"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="glass-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="accent-blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e3a8a" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.4"/>
    </linearGradient>
    
    <!-- Hexagonal pattern (Opacity 4%) -->
    <pattern id="hex-grid" width="24" height="41.569" patternUnits="userSpaceOnUse">
      <path d="M12 0 L24 6.928 L24 20.784 L12 27.712 L0 20.784 L0 6.928 Z M12 41.569 L24 34.641 L24 20.784 L12 27.712 L0 20.784 L0 34.641 Z" 
            fill="none" stroke="#94a3b8" stroke-width="1" stroke-opacity="0.04"/>
    </pattern>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&amp;family=Inter:wght@400;500&amp;family=JetBrains+Mono&amp;display=swap');
      .text-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; fill: #e2e8f0; letter-spacing: 0.18em; font-size: 26px; }
      .text-sub { font-family: 'Inter', sans-serif; font-weight: 400; fill: #94a3b8; letter-spacing: 0.1em; font-size: 13px; }
      .text-mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #64748b; letter-spacing: 0.05em; }
      .text-status { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #22c55e; font-weight: 600; }
      .text-indicator { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 10px; fill: #e2e8f0; letter-spacing: 0.05em; }
      
      /* Subtle Keyframes */
      @keyframes pulse {
        0%, 100% { opacity: 0.35; }
        50% { opacity: 1; }
      }
      @keyframes scan {
        0% { transform: translateY(-10px); opacity: 0; }
        10%, 90% { opacity: 0.15; }
        100% { transform: translateY(350px); opacity: 0; }
      }
      @keyframes circuit-glow {
        0%, 100% { stroke-opacity: 0.05; stroke-width: 1px; }
        50% { stroke-opacity: 0.35; stroke-width: 1.5px; stroke: #3b82f6; }
      }
      .pulsing-node { animation: pulse 3s infinite ease-in-out; }
      .pulsing-green { animation: pulse 2s infinite ease-in-out; }
      .scanning-line { animation: scan 7s infinite linear; }
      .circuit-line { animation: circuit-glow 8s infinite ease-in-out; }
    </style>
  </defs>

  <!-- Background Layer -->
  <rect width="100%" height="100%" fill="url(#bg-grad)"/>

  <!-- Hexagonal Grid Overlay -->
  <rect width="100%" height="100%" fill="url(#hex-grid)"/>

  <!-- Circuit Trace Layer (Subtle PCB traces) -->
  <g fill="none" stroke="#3b82f6" stroke-opacity="0.08" stroke-width="1">
    <path class="circuit-line" d="M 50,170 L 150,170 L 200,120 L 350,120" />
    <path class="circuit-line" d="M 1150,170 L 1050,170 L 1000,220 L 850,220" />
    <path class="circuit-line" d="M 400,40 L 450,90 L 550,90" />
    <path class="circuit-line" d="M 800,300 L 750,250 L 600,250" />
    <circle cx="350" cy="120" r="3" fill="#3b82f6" fill-opacity="0.2"/>
    <circle cx="850" cy="220" r="3" fill="#3b82f6" fill-opacity="0.2"/>
  </g>

  <!-- Scanning Line -->
  <line class="scanning-line" x1="0" y1="0" x2="1200" y2="0" stroke="#3b82f6" stroke-width="2" />

  <!-- Network Graph Decorative Nodes -->
  <g class="pulsing-node">
    <circle cx="120" cy="80" r="4" fill="#3b82f6" opacity="0.4"/>
    <circle cx="120" cy="80" r="10" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.2"/>
    <line x1="120" y1="80" x2="180" y2="50" stroke="#3b82f6" stroke-width="0.5" opacity="0.2"/>
    
    <circle cx="1080" cy="260" r="4" fill="#22c55e" opacity="0.4"/>
    <circle cx="1080" cy="260" r="10" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.2"/>
    <line x1="1080" y1="260" x2="1020" y2="290" stroke="#22c55e" stroke-width="0.5" opacity="0.2"/>
  </g>

  <!-- Glassmorphic HUD Panel (Centered) -->
  <g transform="translate(175, 85)">
    <!-- Glass Panel Background -->
    <rect width="850" height="170" rx="24" fill="url(#glass-grad)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
    
    <!-- Accent Top/Bottom Highlights -->
    <path d="M 24,0 L 826,0" stroke="url(#accent-blue)" stroke-width="1.5" fill="none"/>
    
    <!-- Left Online Badge Indicator -->
    <g transform="translate(35, 30)">
      <circle class="pulsing-green" cx="6" cy="6" r="5" fill="#22c55e"/>
      <circle cx="6" cy="6" r="10" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.3" class="pulsing-green"/>
      <text x="24" y="10" class="text-status">ONLINE</text>
    </g>

    <!-- Right Board Label -->
    <text x="815" y="40" class="text-mono" text-anchor="end">SEC_DASH_v4.1.0 // LOCALHOST</text>

    <!-- Center Main Title -->
    <text x="425" y="75" class="text-title" text-anchor="middle">MUHAMMAD SAIM IFTIKHAR</text>
    
    <!-- Subtitle Bullet Track -->
    <text x="425" y="105" class="text-sub" text-anchor="middle">
      CYBER SECURITY   •   AI AUTOMATION   •   FULL-STACK ENGINEERING
    </text>

    <!-- Bottom Metrics / Active State Indicators -->
    <g transform="translate(110, 135)">
      <!-- System Indicators -->
      <g transform="translate(0, 0)">
        <rect width="12" height="12" rx="3" fill="#3b82f6" opacity="0.8"/>
        <text x="20" y="10" class="text-indicator">AI : ACTIVE</text>
      </g>
      <g transform="translate(150, 0)">
        <rect width="12" height="12" rx="3" fill="#22c55e" opacity="0.8"/>
        <text x="20" y="10" class="text-indicator">SEC : ACTIVE</text>
      </g>
      <g transform="translate(310, 0)">
        <rect width="12" height="12" rx="3" fill="#e2e8f0" opacity="0.6"/>
        <text x="20" y="10" class="text-indicator">AUTO : ACTIVE</text>
      </g>
      <g transform="translate(470, 0)">
        <rect width="12" height="12" rx="3" fill="#3b82f6" opacity="0.8"/>
        <text x="20" y="10" class="text-indicator">DEV : ACTIVE</text>
      </g>
    </g>
  </g>
</svg>
